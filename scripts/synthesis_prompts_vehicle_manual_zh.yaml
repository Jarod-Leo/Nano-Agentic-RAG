# 车机/车辆使用说明书多跳 QA 合成 Prompt（中文版）
# 基于 synthesis_prompts_zh.yaml 新增，适配车机系统、车辆功能与使用说明书场景。

gen_qa_prompt: |
  你是一个面向车辆使用说明书和车机系统手册的信息抽取与问题生成系统。

  # 任务：
  给定一段车辆手册文档，提取一组适合作为 multi-hop QA 起点的 **seed 问答对**。每个 seed QA 必须是**原子化、可验证、可检索**的事实，其中：
  - **问题**聚焦于一个具体的车辆功能、车机菜单、操作路径、状态条件、警告限制、部件名称、适用场景或参数。
  - **答案**必须简洁、准确，并直接来源于文档原文，尽量控制在 1 到 8 个词/短语单元内。
  - 每份文档最多生成 **{gen_qa_num} 个问答对**。优先选择对车主实际使用、故障排查、功能设置或安全操作有价值的事实。
  - 只生成需要查阅手册才能回答的问题，避免常识性、泛泛而谈或脱离车辆说明书的问题。

  # 问答生成规则

  1. 原子性
  - 每个问答必须只对应一个不可再拆分的事实。
  - ✖ “打开功能A并设置功能B需要什么？” → 应拆成两个问题。

  2. Seed 可扩展性
  - 生成的 QA 后续会用于拼接多跳问题，因此问题应指向一个清晰实体或关系，便于与其他车辆手册片段继续连接。
  - 优先选择可继续追问的实体：车机系统、菜单页面、车辆功能、控制部件、警告符号、提示信息、使用条件、页码章节。
  - 避免只产生孤立的数值查找；除非该数值是页码、速度、时间、距离、温度等可与其他功能条件关联的信息。

  3. 可验证性
  - 答案必须至少包含以下一种可核验信息：
    - ✓ 车机系统/菜单/页面名称（如 MBUX智能人机交互系统、设置、导航、车辆）
    - ✓ 功能、部件或控制项名称（如 主动式制动辅助系统、舒适性座椅、语音控制按钮）
    - ✓ 明确条件、状态或操作动作（如 车辆静止时、按下按钮、选择菜单项）
    - ✓ 数值、单位、页码、时间或速度范围（如 281、30 km/h、3秒）
  - ✖ 拒绝“可提升舒适性”“按需设置”等无法唯一核验的模糊答案。

  4. 场景明确性
  - 对涉及操作条件或安全限制的事实，问题中必须明确场景或触发条件。
  - ✓ “车辆处于什么状态时可以启用自动泊车辅助？”
  - ✖ “什么时候可以使用该功能？”

  5. 答案唯一性
  - 问题必须足够具体，使文档中只有一个明确答案。
  - ✖ “车机系统有哪些功能？”（答案可能很多）
  - ✓ “电子版使用说明书位于哪个车机系统中？”

  6. 车机手册优先事实
  - 优先生成以下类型的问题：
    - 菜单路径、入口位置、系统名称和显示页面。
    - 功能开启/关闭/设置步骤中的关键动作。
    - 警告、注意事项、使用限制和前置条件。
    - 指示灯、符号、提示信息的含义。
    - 车辆部件、驾驶辅助、座椅、空调、导航、多媒体、语音交互、连接功能之间的关系。
  - 避免生成只询问“本文档名称”“根据说明书”等元信息的问题，除非该信息本身是手册中需要检索的关键事实。

  7. 必须避免会被 seed 过滤器丢弃的问题
  - 问题中不要出现“根据文档”“根据说明书”“本文档”“这篇文章”“document”“article”“according”等表述。
  - 不要询问“完整名称”“原始名称”“别名”“列举一个名称”等容易变成元信息的问题。
  - 答案不要在问题中直接出现，也不要让答案的大部分词语与问题重合。
  - 答案不要包含“和/或/以及”等并列结构；如果文档中有多个并列答案，请拆成多个单独 QA 或选择最明确的一个。
  - 答案不要超过 10 个词/短语单元；需要长句解释的事实不适合作为 seed QA。

  # 输出格式：
  只输出 JSON 数组，每个元素包含，不要输出 Markdown 代码块或解释：
  - `question`: 一个具体、自然、可回答的问题。
  - `answer`: 来自文档的事实性答案。

  # 示例

  ```json
  [
    {{
      "question": "车辆的电子版使用说明书位于哪个车机系统中？",
      "answer": "MBUX智能人机交互系统"
    }},
    {{
      "question": "在这本使用说明书中，符号“！”表示什么？",
      "answer": "注意事项"
    }},
    {{
      "question": "MBUX智能人机交互系统中提到的座椅功能是什么？",
      "answer": "舒适性座椅"
    }}
  ]
  ```

  以下是需要处理的车辆手册文档内容：
  {input_doc}

refine_prompt: |
  你是一个车辆手册问答清洗助手，负责从原始答案中提取最简洁、最准确的答案。

  ## 输入：
  给定一个**问题**及其对应的**原始答案**。你的任务是提取直接回答问题的最小必要信息。

  ## 处理规则：
  1. 只保留问题所询问的确切信息，不加入解释。
  2. 保留车辆系统、菜单、功能、部件、符号和提示语的原始名称。
  3. 如果答案是操作条件，保留完整条件短语，不能截断关键限定词。
  4. 如果答案包含单位、速度、时间、页码或编号，必须保留单位和数字格式。
  5. 绝不添加或推断原始答案中没有明确出现的信息。
  6. 优先输出适合作为 seed 的短答案，尽量控制在 1 到 8 个词/短语单元内。
  7. 如果原始答案包含解释句，只提取车机系统名、功能名、部件名、菜单名、状态条件、符号含义、页码或数值。
  8. 如果答案包含多个并列项，且问题没有明确要求全部列出，只保留最直接回答问题的一项；如果缺少任一项都会改变答案含义，则保留完整条件。
  9. 不要把问题中的词重复到 refined_answer 中，除非它是标准功能名或系统名的一部分。

  ## 输出格式（JSON）：
  {{
    "question": "<原始问题>",
    "original_answer": "<原始答案>",
    "refined_answer": "<清洗后的简洁答案>"
  }}

  ## 示例：
  输入：
  问题：车辆的电子版使用说明书位于哪个车机系统中？
  原始答案：车辆的电子版使用说明书可在 MBUX 智能人机交互系统中找到。

  输出：
  {{
    "question": "车辆的电子版使用说明书位于哪个车机系统中？",
    "original_answer": "车辆的电子版使用说明书可在 MBUX 智能人机交互系统中找到。",
    "refined_answer": "MBUX智能人机交互系统"
  }}

  以下是需要处理的数据：
  问题：{question}
  原始答案：{original_answer}

merge_qa_prompt_morehop: |
  你是构建车辆手册多跳问题的专家，擅长将车机系统、车辆功能、操作条件和说明书事实连接成需要多步检索才能回答的问题。

  ## 任务
  给定多个问题-答案-文档三元组，生成 **0 到 {max_num}** 个多跳问题。这些问题必须结合**最近的前序跳**（Previous_Hops 的最后一个元素）和 New_pair 才能回答。
  Previous_Hops 只能作为支撑上下文使用：其中的功能、系统、条件、符号或部件关系必须被保留，不得删除、弱化或矛盾。
  只有当两个事实在车辆手册语境下逻辑有效、无歧义且有文档支撑时才生成问题；如果关联弱或需要猜测，返回空 JSON 列表 []。

  ## 输入格式
  Previous_Hops:
    类型: "对象列表（按推理链从旧到新排列）"
    每个元素:
      - Hop_number
      - Question: 字符串
      - Answer: 字符串
      - Doc: 字符串
  New_pair:
    类型: 对象（待附加到推理链的候选 QA+文档）
    字段:
      - Question: 字符串
      - Answer: 字符串
      - Doc: 字符串

  ## 输出格式
  返回最多 {max_num} 个对象的 JSON 列表。每个对象格式为：
  {{
    "type": "inference" | "comparison",
    "final_question": "...",
    "final_answer": "..."
  }}

  如果无法创建高质量多跳问题：返回空 JSON 列表 []。

  ## 类型说明
  - inference（推理型）：
    最终问题串联车辆手册事实，使回答需要同时使用(1)最后一个前序跳的事实和(2)New_pair 的事实。推理型的 final_answer 必须等于 New_pair 的 Answer。
  - comparison（比较型）：
    最终问题比较两个车辆功能、条件、页面、数值或限制的同一维度。两个比较值必须都由文档明确支撑。

  ## 规则
  - 1. 必须保留 Previous_Hops 中涉及的车辆系统、菜单路径、功能、部件、条件和限制，不得改写成更泛化的说法。
  - 2. 最终问题必须由（最近的 Previous_Hop）+（New_pair）生成，不能只是复述 New_pair。
  - 3. 不得在 final_question 中直接泄露任何前序跳答案；只能用前序问题里的定义性描述来指代它。
  - 4. 最终问题必须真正依赖所有 QA-文档对才能回答，而不是把两个独立事实拼接在一起。
  - 5. 跨文档连接实体时，必须从文档内容确认它们指向同一车辆、同一车机系统、同一功能、同一符号或同一操作场景。
  - 6. 比较型只能比较同一维度，例如页码对页码、速度对速度、开启条件对开启条件、系统入口对系统入口。
  - 7. 优先生成自然的车主提问，避免生硬地出现“Question1/Question2/文档”等字样。
  - 8. 如果逻辑关联弱、实体可能误连、答案不唯一或证据不足，直接返回 []。
  - 9. 只输出最终 JSON 列表，不要包含思维过程、解释或额外文本。

  ## 检查清单
  - [ ] 是否必须结合最近前序跳和 New_pair 才能回答？
  - [ ] 中间答案是否已隐藏？
  - [ ] 车辆系统/功能/条件/符号是否被准确保留？
  - [ ] 链接实体是否在文档中被确认为同一对象或同一场景？
  - [ ] final_answer 是否直接由 New_pair 支撑？

  以下是需要处理的数据：
  {Data}

  New_pair:
  Question: {New_question}
  Answer: {New_answer}
  Doc: {New_document}
  只输出最终 JSON 列表，不要解释推理过程。

merge_qa_prompt_morehop_comparison: |
  你是构建车辆手册多跳比较问题的专家。

  ## 任务
  给定多个问题-答案-文档三元组，生成 **0 到 {max_num}** 个多跳问题。这些问题必须结合**最近的前序跳**和 New_pair 进行推理或比较。
  只有当比较对象、比较维度和答案都由车辆手册明确支撑时才生成问题；否则返回空 JSON 列表 []。

  ## 输入格式
  Previous_Hops:
    类型: "对象列表（按推理链从旧到新排列）"
    每个元素:
      - Hop_number
      - Question: 字符串
      - Answer: 字符串
      - Doc: 字符串
  New_pair:
    类型: 对象（待附加到推理链的候选 QA+文档）
    字段:
      - Question: 字符串
      - Answer: 字符串
      - Doc: 字符串

  ## 输出格式
  返回最多 {max_num} 个对象的 JSON 列表。每个对象格式为：
  {{
    "type": "inference" | "comparison",
    "final_question": "...",
    "final_answer": "..."
  }}

  如果无法创建高质量多跳问题：返回空 JSON 列表 []。

  ## 类型说明
  - inference（推理型）：最终问题需要串联前序事实和 New_pair；final_answer 必须等于 New_pair 的 Answer。
  - comparison（比较型）：最终问题比较两个或多个不同车辆功能、菜单、条件、页面、符号、数值或限制在同一维度上的差异；答案可以是某个实体、具体值或“是/否”。

  ## 规则
  - 1. 不得删除、弱化或矛盾 Previous_Hops 中任何车辆手册事实。
  - 2. 最终问题必须依赖所有问答-文档对才能回答，且必须比所有前序问题更完整、更具体。
  - 3. 比较型必须包含两个或更多不同对象，且比较同一维度；不得比较无关属性。
  - 4. 任何前序跳答案都不得在最终问题中被直接指名，必须用其定义性角色或描述来引用。
  - 5. 当引用涉及比较时，完整比较从句必须保留，最终问题应包含“还是”“和……相比”“……与……之间”等中文比较句式。
  - 6. 如果答案无法由文档明确推出，或者只是把两个独立事实并列，返回 []。
  - 7. 只输出最终 JSON 列表，不要包含思维过程、解释或额外文本。

  ## 检查清单
  - [ ] 比较对象是否都是车辆手册中的明确对象？
  - [ ] 比较维度是否完全一致？
  - [ ] 中间答案是否未泄露？
  - [ ] 最终问题是否需要所有支撑事实？
  - [ ] 答案是否由文档明确支撑？

  以下是需要处理的数据：
  {Data}

  New_pair:
  Question: {New_question}
  Answer: {New_answer}
  Doc: {New_document}
  只输出最终 JSON 列表，不要解释推理过程。

more_optional_answer_prompt: |
  你是车辆手册答案别名和同义表述生成专家。你的任务是为给定答案生成合理、常见、等价的替代表述。

  **关键准则：**
  1. 每个替代表述必须与原始答案指代完全相同的车辆系统、功能、部件、菜单、符号、条件、数值或页码。
  2. 可包含常见缩写、中文全称/简称、英文名称、品牌写法、单位格式和数字读法。
  3. 对车机系统名称可保留中英文或缩写变体，例如 MBUX、Mercedes-Benz User Experience。
  4. 不得生成语义更宽或更窄的概念，不得把功能名改成近似但不同的功能。
  5. 始终将原始输入作为列表第一项。
  6. 输出为 JSON 字符串列表。

  输入：{refined_answer}
  请列出最常见且语义完全相同的文本表述，最多 15 个。不要包含仅空格、标点差异导致的琐碎变体。
  只返回 JSON 字符串列表，不要解释。

inference_check_prompt: |
  你是车辆手册多跳 QA 验证系统。

  ## 任务
  给定两个问题-答案-文档三元组：
  (Question1, Answer1, Doc1) 和 (Question2, Answer2, Doc2)，以及最终多跳 QA：
  - Final_question
  - Final_answer
  - 类型: "inference"

  你的工作是验证最终 QA 在车辆手册语境下是否逻辑有效。

  ## 输出格式
  返回 JSON 对象：
  {{
    "valid": "true" | "false",
    "error_type": "bad_linkage" | "entity_false_link" | "trivial_concatenation" | "lacking_evidence" | "other",
    "justification": "简短的问题说明"
  }}

  ## 定义与规则
  - inference：最终问题必须把 QA1 与 QA2 连接成车辆手册事实链，final_answer 必须与 Answer2 等价。
  - bad_linkage：两个事实表面相关，但车辆系统、功能、条件或操作场景没有真实逻辑连接。
  - entity_false_link：把不同车型、系统、菜单、功能、符号或页面误认为同一对象。
  - trivial_concatenation：最终问题只是拼接两个事实，没有真正推理。
  - lacking_evidence：文档没有充分支持最终问题或答案。
  - final_question 不应泄露 Answer1。

  以下是需要处理的数据：
  Question1: {Question1}
  Answer1: {Answer1}
  Doc1:{Document1}
  Question2: {Question2}
  Answer2: {Answer2}
  Doc2:{Document2}
  Final_question:{Final_question}
  Final_answer:{Final_answer}
  类型:{qa_type}
  只返回上述 JSON 对象，不要包含解释。

comparison_check_prompt: |
  你是车辆手册多跳比较 QA 验证系统。

  ## 任务
  给定两个问题-答案-文档三元组：
  (Question1, Answer1, Doc1) 和 (Question2, Answer2, Doc2)，以及最终多跳 QA：
  - Final_question
  - Final_answer
  - 类型: "comparison"

  你的工作是验证最终 QA 是否为有效的车辆手册比较问题。

  ## 输出格式
  返回 JSON 对象：
  {{
    "valid": "true" | "false",
    "error_type": "forced_pairing" | "dimension_mismatch" | "lacking_evidence" | "trivial_concatenation" | "other",
    "justification": "简短的问题说明"
  }}

  ## 定义与规则
  - comparison：最终问题必须比较来自 QA1 和 QA2 的两个车辆对象在同一维度上的事实。
  - forced_pairing：两个对象没有有意义的可比关系。
  - dimension_mismatch：比较维度不一致，例如把菜单入口与速度限制比较。
  - lacking_evidence：任一比较值或答案未被文档明确支撑。
  - trivial_concatenation：只是并列两个事实，没有形成比较判断。

  以下是需要处理的数据：
  Question1: {Question1}
  Answer1: {Answer1}
  Doc1: {Document1}
  Question2: {Question2}
  Answer2: {Answer2}
  Doc2: {Document2}
  Final_question: {Final_question}
  Final_answer: {Final_answer}
  类型: {qa_type}
  只返回上述 JSON 对象，不要包含解释。

reasoning_prompt: |
  请直接回答以下车辆手册问题。不要猜测；如果无法仅凭问题本身确定答案，请返回“我无法回答这个问题。”
  问题是：
  {problem}
  确保回答尽可能简洁，只关注关键信息。

comparison_reasoning_prompt: |
  请直接回答以下车辆手册比较问题。对于比较类问题，如果你不确定答案，请不要猜测或随机选择，而是返回“我无法回答这个问题。”
  问题是：
  {problem}
  确保回答尽可能简洁，只关注关键信息。

singlehop_prompt: |
  以下是车辆手册中的相关文档，用于帮助回答问题。
  文档：
  {Document}
  问题：
  {Question}
  请只使用提供文档中的信息回答问题。确保回答尽可能简洁，只关注关键信息。
  如果你无法回答该问题，请返回“我无法回答这个问题。<无法回答的原因>”。

multihop_inference_prompt_morehop: |
  你是车辆手册解题专家。现在你需要解决一个多跳推理问题。
  多跳推理问题：需要将多个车辆手册事实按逻辑链组合，才能得出最终答案。

  ## 以下是支撑事实，用于帮助回答问题。
  {Data}
  最终问题: {FinalQuestion}
  请只根据支撑事实解决这个问题并返回结果。确保回答尽可能简洁，只关注关键信息。

multihop_comparison_prompt_morehop: |
  你是车辆手册解题专家。现在你需要解决一个多跳比较问题。
  多跳比较问题：需要从多个车辆手册片段中检索并比较同一维度的信息，才能确定答案。

  ## 以下是支撑事实，用于帮助回答问题。
  {Data}
  最终问题: {FinalQuestion}
  请只根据支撑事实解决这个问题并返回结果。确保回答尽可能简洁，只关注关键信息。

EssEq_prompt: |
  你是一名车辆手册问答评估员。请评估“其他答案”是否保留了“标准答案”中与问题相关的所有关键信息。

  # 评分标准
  - **2 分** → 其他答案与标准答案完全等价。车辆系统、功能、部件、菜单、条件、数值或符号含义完全一致，即使措辞不同。
  - **1 分** → 其他答案包含标准答案的全部关键信息，但添加了额外且不矛盾的信息。
  - **0 分** → 其他答案遗漏关键信息，或引入错误、矛盾、范围扩大/缩小的信息。

  始终根据问题要求判断哪些信息是关键。对于车辆功能、车机菜单、警告条件和数值单位，不得忽略限定条件。

  # 输出格式：
  只返回 JSON，不要有额外文本。
  ```json
  {{
    "answer_reason": "评分原因",
    "answer_score": 0/1/2
  }}
  ```
